<header class="site-header">
  <div class="container header-inner">

    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Michael Doe Counselling home">
      <img
        src="{{ '/assets/images/michael-doe-logo.webp' | relative_url }}"
        alt="Michael Doe Counselling"
        class="header-logo-img"
      >
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">

    <label for="nav-toggle" class="nav-toggle-label" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="#examples">Structure</a>
      <a href="#customise">Customise</a>
      <a href="#space">Feel</a>
      <a href="#process">Process</a>
      <a href="#contact" class="nav-button">Get in touch</a>
    </nav>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const navToggle = document.getElementById('nav-toggle');
      const navLinks = document.querySelectorAll('.site-nav a');

      function closeMobileNav() {
        if (navToggle) navToggle.checked = false;
        document.body.style.overflow = '';
      }

      navLinks.forEach(function (link) {
        link.addEventListener('click', closeMobileNav);
      });

      window.addEventListener('hashchange', closeMobileNav);
    });
  </script>
</header>
