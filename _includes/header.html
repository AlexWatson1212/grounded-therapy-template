<header class="site-header">
  <div class="container header-inner">

    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Alexander Watson Counselling home">
      <span class="site-logo-text">Alexander Watson Counselling</span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">

    <label for="nav-toggle" class="nav-toggle-label" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="{{ '/how-i-work/' | relative_url }}">How I work</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/fees/' | relative_url }}">Fees</a>
      <a href="{{ '/contact/' | relative_url }}" class="nav-button">Get in touch</a>
    </nav>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const navToggle = document.getElementById('nav-toggle');
      const navLinks = document.querySelectorAll('.site-nav a');

      function closeMobileNav() {
        if (navToggle) {
          navToggle.checked = false;
        }

        document.body.style.overflow = '';
      }

      navLinks.forEach(function (link) {
        link.addEventListener('click', function () {
          closeMobileNav();
        });
      });

      window.addEventListener('hashchange', function () {
        closeMobileNav();
      });
    });
  </script>

</header>
